<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Fruehlings-Parcours Rundlauf</title>
  <desc id="desc">Rundparcours mit sechs klar getrennten Stationen. Ball bleibt ueberall dabei. Reifensprung ist farbcodiert, Balance-Bruecke folgt dem Schema /=---=_.</desc>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#0f766e" />
    </marker>
    <style>
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #0b3f3a; }
      .subtitle { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .label { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #0b3f3a; }
      .small { font: 500 13px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .station { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; rx: 14; }
      .lane { fill: none; stroke: #0f766e; stroke-width: 4; stroke-dasharray: 10 8; marker-end: url(#arrow); }
      .cone { fill: #fb923c; stroke: #c2410c; stroke-width: 2; }
      .ringBlue { fill: none; stroke: #2563eb; stroke-width: 4; }
      .ringRed { fill: none; stroke: #dc2626; stroke-width: 4; }
      .ringGreen { fill: none; stroke: #16a34a; stroke-width: 4; }
      .box { fill: #d1d5db; stroke: #4b5563; stroke-width: 2; }
      .matBlue { fill: #93c5fd; stroke: #1d4ed8; stroke-width: 2; }
      .goal { fill: none; stroke: #111827; stroke-width: 3; }
      .ball { fill: #f59e0b; stroke: #b45309; stroke-width: 1.6; }
      .gate { fill: none; stroke: #7c3aed; stroke-width: 5; }
      .legend { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; rx: 10; }
    </style>
  </defs>

  <rect x="0" y="0" width="1400" height="900" fill="#f8fafc" />
  <rect x="20" y="20" width="1360" height="860" rx="18" fill="#eef6ff" stroke="#cbd5e1" stroke-width="2" />

  <text x="60" y="78" class="title">Fruehlings-Parcours (Rundlauf)</text>
  <text x="60" y="108" class="subtitle">Ball immer mitnehmen - keine Rueckweg-Station</text>

  <rect x="40" y="190" width="56" height="430" rx="6" fill="#dbeafe" stroke="#93c5fd" />

  <circle cx="245" cy="760" r="21" fill="#fde68a" stroke="#f59e0b" stroke-width="2" />
  <text x="278" y="766" class="label">START</text>

  <rect class="station" x="120" y="610" width="300" height="210" />
  <text x="145" y="646" class="label">1) Slalomweg (prellen)</text>
  <polygon class="cone" points="155,760 168,728 181,760" />
  <polygon class="cone" points="205,780 218,748 231,780" />
  <polygon class="cone" points="255,760 268,728 281,760" />
  <polygon class="cone" points="305,780 318,748 331,780" />
  <polygon class="cone" points="355,760 368,728 381,760" />
  <text x="145" y="804" class="small">Ball im Slalom prellen</text>

  <rect class="station" x="470" y="610" width="330" height="210" />
  <text x="495" y="646" class="label">2) Reifensprung</text>
  <circle class="ringBlue" cx="530" cy="760" r="19" />
  <circle class="ringRed" cx="590" cy="734" r="19" />
  <circle class="ringGreen" cx="650" cy="760" r="19" />
  <circle class="ringBlue" cx="710" cy="734" r="19" />
  <circle class="ringRed" cx="770" cy="760" r="19" />
  <text x="495" y="792" class="small">Rot=rechts, Blau=links, Gruen=beidbeinig</text>

  <rect class="station" x="840" y="600" width="440" height="220" />
  <text x="865" y="636" class="label">3) Balance-Bruecke</text>
  <rect class="box" x="915" y="740" width="56" height="40" />
  <rect class="box" x="1120" y="740" width="56" height="40" />
  <line x1="850" y1="792" x2="915" y2="760" stroke="#9a6a3b" stroke-width="11" />
  <line x1="971" y1="760" x2="1120" y2="760" stroke="#9a6a3b" stroke-width="11" />
  <rect class="matBlue" x="1182" y="740" width="72" height="40" rx="8" />
  <text x="865" y="670" class="small">Schema: /=---=_</text>
  <text x="865" y="692" class="small">/ Bank schraeg, = Kasten, - Bank, _ Matte</text>

  <rect class="station" x="950" y="320" width="330" height="210" />
  <text x="975" y="356" class="label">4) Purzelbaum</text>
  <rect class="matBlue" x="1005" y="400" width="150" height="78" rx="10" />
  <path d="M1025 442 C1058 394, 1093 488, 1125 442" fill="none" stroke="#1d4ed8" stroke-width="3" />
  <text x="975" y="510" class="small">Ball kurz ablegen, Purzelbaum, wieder mitnehmen</text>

  <rect class="station" x="520" y="120" width="350" height="220" />
  <text x="545" y="156" class="label">5) Kreativstation Farbentor</text>
  <path class="gate" d="M580 290 L580 230 L635 230 L635 290" />
  <path class="gate" d="M680 290 L680 220 L740 220 L740 290" />
  <path class="gate" d="M790 290 L790 230 L845 230 L845 290" />
  <text x="545" y="320" class="small">Mit Ball durch Tore, Aufgabe auf Zuruf</text>

  <rect class="station" x="120" y="170" width="340" height="260" />
  <text x="145" y="206" class="label">6) Zielwurf Handballtor</text>
  <rect class="goal" x="56" y="235" width="94" height="136" />
  <line x1="56" y1="235" x2="150" y2="371" stroke="#9ca3af" stroke-width="1.5" />
  <line x1="56" y1="371" x2="150" y2="235" stroke="#9ca3af" stroke-width="1.5" />
  <path d="M260 300 Q190 300, 124 320" fill="none" stroke="#0f766e" stroke-width="3" marker-end="url(#arrow)" />
  <text x="145" y="392" class="small">Mit Ball zur Wurflinie, dann aufs Tor werfen</text>

  <path class="lane" d="M420 720 L470 720" />
  <path class="lane" d="M800 720 L840 720" />
  <path class="lane" d="M1060 600 L1080 530" />
  <path class="lane" d="M980 320 L870 260" />
  <path class="lane" d="M520 230 L460 230" />
  <path class="lane" d="M250 430 L240 610" />

  <rect class="legend" x="920" y="36" width="440" height="108" />
  <text x="942" y="64" class="small">Gestrichelte Linie = Laufrichtung im Rundparcours</text>
  <text x="942" y="88" class="small">Oranger Punkt je Station = Ball bleibt immer dabei</text>
  <text x="942" y="112" class="small">Reifenregel: Rot rechts | Blau links | Gruen beidbeinig</text>
  <text x="942" y="136" class="small">Bruecken-Schema: /=---=_</text>
</svg>
