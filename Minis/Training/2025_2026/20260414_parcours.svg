<svg xmlns="http://www.w3.org/2000/svg" width="700" height="180" viewBox="0 0 700 180">
  <rect width="700" height="180" fill="#fff" stroke="#ddd"/>
  <!-- Station 1: Slalom cones -->
  <g transform="translate(20,20)">
    <text x="0" y="12" font-size="12" fill="#333">Slalom (4 Hütchen)</text>
    <g transform="translate(0,30)" fill="orange">
      <polygon points="10,60 20,60 15,40"/>
      <polygon points="60,60 70,60 65,40"/>
      <polygon points="110,60 120,60 115,40"/>
      <polygon points="160,60 170,60 165,40"/>
    </g>
  </g>

  <!-- Station 2: Hoops -->
  <g transform="translate(220,20)">
    <text x="0" y="12" font-size="12" fill="#333">Reifen (3x)</text>
    <g transform="translate(10,30)" stroke="#2a7" stroke-width="6" fill="none">
      <circle cx="20" cy="40" r="16"/>
      <circle cx="80" cy="40" r="16"/>
      <circle cx="140" cy="40" r="16"/>
    </g>
  </g>

  <!-- Station 3: Mat (somersaults) -->
  <g transform="translate(420,20)">
    <text x="0" y="12" font-size="12" fill="#333">Matte (Purzelbäume)</text>
    <rect x="10" y="30" width="120" height="40" rx="6" fill="#f6f6ff" stroke="#88a"/>
    <text x="20" y="55" font-size="10" fill="#555">Matte</text>
  </g>

  <!-- Station 4: Small box + cone -->
  <g transform="translate(560,20)">
    <text x="0" y="12" font-size="12" fill="#333">Ziel (Hütchen auf Kasten)</text>
    <rect x="30" y="36" width="40" height="28" fill="#e6e6e6" stroke="#999"/>
    <polygon points="50,30 60,50 40,50" fill="orange"/>
  </g>

  <!-- footer caption -->
  <text x="12" y="170" font-size="11" fill="#666">Parcours (pro Bahn)</text>
</svg>
